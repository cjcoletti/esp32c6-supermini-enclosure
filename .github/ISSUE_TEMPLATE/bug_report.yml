name: Reportar bug
description: Algo não funcionou como esperado
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! Descreva o que aconteceu — não é necessário enviar código ou Pull Request.
        Detalhes em [CONTRIBUTING.md](https://github.com/cjcoletti/esp32c6-supermini-enclosure/blob/main/CONTRIBUTING.md).

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento observado
      description: O que aconteceu de fato?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Liste os passos na ordem em que executou.
      placeholder: |
        1. Impressão do base.stl em PLA
        2. Montagem com ESP32-C6 Super Mini + mini fonte Hilink
        3. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Ambiente
      description: Hardware, impressora, filamento e versão do modelo, se relevante.
      placeholder: "Ex.: ESP32-C6 Super Mini, mini fonte Hilink, Bambu A1, PLA, modelo V16.3"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Fotos ou observações (opcional)
      description: Detalhes visuais, medidas ou configurações de slicer, se tiver.
      render: shell
    validations:
      required: false
